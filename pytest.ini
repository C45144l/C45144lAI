[pytest]
# Pytest configuration for C45144lAI Defense System

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options
[coverage:run]
source = src
omit = 
    */venv/*
    */tests/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
